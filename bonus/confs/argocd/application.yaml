apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-argo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitlab-web.gitlab.svc.cluster.local/root/test.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
